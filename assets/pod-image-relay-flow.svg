<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Pod Image Relay flow diagram</title>
  <desc id="desc">Cretched sends a GIF through the relay server to Mike's Podcast Device app, where the image appears in Images and Animated GIFs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="sender" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="relay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="receiver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2 L12 7 L2 12 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="1280" height="520" rx="28" fill="url(#bg)"/>
  <circle cx="118" cy="88" r="150" fill="#38bdf8" opacity="0.1"/>
  <circle cx="1096" cy="438" r="170" fill="#f59e0b" opacity="0.11"/>

  <text x="56" y="62" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">How the relay works</text>
  <text x="56" y="94" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="16">Same room + same token. Cretched sends. Mike receives. The stream image updates.</text>

  <!-- Cretched -->
  <g filter="url(#shadow)">
    <rect x="64" y="148" width="274" height="244" rx="26" fill="url(#sender)" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="105" cy="192" r="22" fill="#2563eb"/>
    <text x="98" y="200" fill="#eff6ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">1</text>
    <text x="142" y="188" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Cretched</text>
    <text x="142" y="216" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="14">Chrome / Edge extension</text>

    <rect x="96" y="246" width="210" height="78" rx="16" fill="#ffffff" stroke="#93c5fd"/>
    <text x="122" y="276" fill="#1d4ed8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Drag GIF or image</text>
    <text x="122" y="302" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="13">Settings are saved locally</text>

    <rect x="105" y="346" width="192" height="28" rx="14" fill="#dbeafe"/>
    <text x="124" y="365" fill="#1e3a8a" font-family="Consolas, monospace" font-size="12">room + masked token</text>
  </g>

  <!-- Relay -->
  <g filter="url(#shadow)">
    <rect x="500" y="150" width="280" height="240" rx="28" fill="url(#relay)" stroke="#fbbf24" stroke-width="4"/>
    <circle cx="546" cy="194" r="23" fill="#fbbf24"/>
    <text x="539" y="202" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">2</text>
    <text x="588" y="190" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Relay Server</text>
    <text x="588" y="218" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="14">Railway or local Node service</text>

    <rect x="532" y="248" width="216" height="42" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="560" y="275" fill="#fef3c7" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Checks token + room</text>
    <rect x="532" y="306" width="216" height="42" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="548" y="333" fill="#fef3c7" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Forwards latest image</text>
  </g>

  <!-- Mike -->
  <g filter="url(#shadow)">
    <rect x="944" y="148" width="274" height="244" rx="26" fill="url(#receiver)" stroke="#0284c7" stroke-width="3"/>
    <circle cx="985" cy="192" r="22" fill="#0f172a"/>
    <text x="978" y="200" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">3</text>
    <text x="1022" y="188" fill="#083344" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Mike</text>
    <text x="1022" y="216" fill="#075985" font-family="Segoe UI, Arial, sans-serif" font-size="14">Windows Podcast Device app</text>

    <rect x="976" y="246" width="92" height="78" rx="14" fill="#dbeafe" stroke="#38bdf8"/>
    <text x="993" y="277" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Web</text>
    <text x="984" y="300" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Browser</text>

    <rect x="1084" y="246" width="102" height="78" rx="14" fill="#8b6f4a"/>
    <text x="1098" y="276" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Streamlabs</text>
    <text x="1100" y="300" fill="#fef3c7" font-family="Segoe UI, Arial, sans-serif" font-size="12">Chat / Overlay</text>

    <rect x="976" y="340" width="210" height="32" rx="16" fill="#0284c7"/>
    <text x="1014" y="361" fill="#f0f9ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Images / Animated GIFs</text>
  </g>

  <!-- Arrows -->
  <path d="M350 270 C405 270 434 270 486 270" fill="none" stroke="#fbbf24" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M795 270 C850 270 878 270 930 270" fill="none" stroke="#fbbf24" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="365" y="246" fill="#fde68a" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">sender connects</text>
  <text x="830" y="246" fill="#fde68a" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">receiver updates</text>

  <rect x="412" y="420" width="456" height="46" rx="23" fill="#020617" stroke="#334155"/>
  <text x="455" y="449" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Production uses </text>
  <text x="567" y="449" fill="#fbbf24" font-family="Consolas, monospace" font-size="15" font-weight="700">wss://</text>
  <text x="625" y="449" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="15"> plus a long shared token.</text>
</svg>
